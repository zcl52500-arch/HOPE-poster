<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPE 文案视觉生图</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2E84C5; --bg: #f0f2f5; }
        body { margin: 0; background: var(--bg); font-family: -apple-system, "Noto Sans SC", sans-serif; display: flex; height: 100vh; }

        /* 控制面板 */
        .panel { width: 360px; background: white; padding: 30px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; overflow-y: auto; }
        h2 { margin-bottom: 25px; color: #333; font-size: 22px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: bold; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #246ba3; }

        /* 预览区 */
        .preview-area { flex: 1; padding: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; overflow-y: auto; }

        /* 海报卡片样式 */
        .poster-card { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 3/4; 
            background: #222; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }

        /* 实际海报导出区域 */
        .poster-content {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            color: white;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
        }

        /* 遮罩：让文字更清晰 */
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
            z-index: 1;
        }

        .text-layer {
            position: relative;
            z-index: 2;
            padding: 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .title { font-size: 30px; font-weight: 800; line-height: 1.4; margin-bottom: 15px; }
        .subtitle { font-size: 16px; opacity: 0.9; line-height: 1.6; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 15px; }
        .footer { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; }
        .author { font-size: 12px; letter-spacing: 1px; opacity: 0.8; }

        .dl-btn {
            position: absolute; bottom: 15px; right: 15px; z-index: 10;
            background: white; color: #333; border: none; padding: 6px 12px;
            border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold;
        }

        /* 布局变体 */
        .layout-center { justify-content: center; text-align: center; }
        .layout-bottom { justify-content: flex-end; }
    </style>
</head>
<body>

<div class="panel">
    <h2>HOPE 海报生成</h2>
    <div class="field">
        <label>标题文字</label>
        <textarea id="title" rows="3">教育的改变，往往从一个微小的行动开始</textarea>
    </div>
    <div class="field">
        <label>副标题 / 诗句</label>
        <textarea id="subtitle" rows="2">每一个努力的瞬间，都值得被看见。</textarea>
    </div>
    <div class="field">
        <label>情感关键词 (如: nature, art, sea)</label>
        <input id="keyword" type="text" value="nature">
    </div>
    <div class="field">
        <label>署名</label>
        <input id="author" type="text" value="HOPE 学堂">
    </div>
    <button onclick="renderAll()">点击生成生图海报</button>
</div>

<div class="preview-area" id="container"></div>

<script>
    // 随机渐变色，防止图片加载失败
    const gradients = [
        'linear-gradient(135deg, #2E84C5 0%, #111 100%)',
        'linear-gradient(135deg, #76B92E 0%, #111 100%)',
        'linear-gradient(135deg, #6a11cb 0%, #2575fc 100%)',
        'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)'
    ];

    function renderAll() {
        const container = document.getElementById('container');
        const title = document.getElementById('title').value;
        const subtitle = document.getElementById('subtitle').value;
        const author = document.getElementById('author').value;
        const kw = document.getElementById('keyword').value;

        container.innerHTML = '';

        for (let i = 0; i < 4; i++) {
            // 使用 Picsum 随机图，添加随机 seed 确保每张不同
            const randomSeed = Math.floor(Math.random() * 1000);
            const imgUrl = `https://picsum.photos/seed/${randomSeed}/800/1200`;
            const randomGrad = gradients[i % gradients.length];
            const layoutClass = i % 2 === 0 ? 'layout-center' : 'layout-bottom';

            const card = document.createElement('div');
            card.className = 'poster-card';
            card.innerHTML = `
                <div class="poster-content" id="p-${i}" style="background-image: ${randomGrad}, url('${imgUrl}')">
                    <div class="overlay"></div>
                    <div class="text-layer ${layoutClass}">
                        <div class="title">${title}</div>
                        <div class="subtitle">${subtitle}</div>
                        <div class="footer">
                            <div class="author">${author}</div>
                        </div>
                    </div>
                </div>
                <button class="dl-btn" onclick="download('p-${i}')">下载图片</button>
            `;
            container.appendChild(card);
        }
    }

    function download(id) {
        const el = document.getElementById(id);
        html2canvas(el, {
            useCORS: true,
            allowTaint: false,
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'HOPE-Poster.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // 初次自动执行
    window.onload = renderAll;
</script>

</body>
</html>
