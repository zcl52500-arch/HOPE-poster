<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视觉海报生成器</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 左侧控制面板 */
        .panel {
            width: 380px;
            background: white;
            padding: 40px 30px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { margin: 0 0 10px; color: #1e293b; font-size: 24px; }
        
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        
        textarea, input, select {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        textarea:focus { border-color: var(--primary); }

        button {
            margin-top: 10px;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        /* 右侧预览区 */
        .preview-container {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 30px;
            background: #f1f5f9;
        }

        /* 海报样式核心 */
        .poster {
            width: 100%;
            aspect-ratio: 3 / 4;
            background: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .poster:hover { transform: translateY(-5px); }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.7); /* 自动压暗背景以突出文字 */
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            padding: 40px;
            height: 100%;
            display: flex;
            flex-direction: column;
            color: white;
            box-sizing: border-box;
        }

        /* 不同的排版变体 */
        .style-elegant { justify-content: center; text-align: center; }
        .style-minimal { justify-content: flex-end; text-align: left; }
        .style-bold { justify-content: flex-start; text-align: left; }

        .title { font-size: 32px; font-weight: 800; line-height: 1.4; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .subtitle { font-size: 18px; font-weight: 300; opacity: 0.9; border-left: 3px solid var(--primary); padding-left: 15px; }
        .author { margin-top: auto; font-size: 14px; letter-spacing: 2px; opacity: 0.8; }

        .download-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 5;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="panel">
    <h2>HOPE AI 海报</h2>
    
    <div class="field">
        <label>核心文案 (标题)</label>
        <textarea id="title" rows="3">保持热爱，奔赴山海</textarea>
    </div>

    <div class="field">
        <label>辅助说明 (副标题)</label>
        <textarea id="subtitle" rows="2">每一个努力的瞬间，都值得被看见。</textarea>
    </div>

    <div class="field">
        <label>视觉关键词 (英文，如 nature, city)</label>
        <input id="keyword" type="text" value="mountain">
    </div>

    <div class="field">
        <label>署名</label>
        <input id="author" type="text" value="@HOPE Design">
    </div>

    <button onclick="generatePosters()">生成多套视觉方案</button>
    <p style="font-size: 12px; color: #94a3b8;">* 点击图片右上角可单张下载</p>
</div>

<div class="preview-container" id="preview">
    </div>

<script>
    const styles = ['style-elegant', 'style-minimal', 'style-bold'];

    function generatePosters() {
        const preview = document.getElementById('preview');
        const title = document.getElementById('title').value;
        const subtitle = document.getElementById('subtitle').value;
        const author = document.getElementById('author').value;
        const keyword = document.getElementById('keyword').value || 'abstract';

        preview.innerHTML = ''; // 清空之前生成的

        // 生成 6 种不同的 AI 视觉组合
        for (let i = 0; i < 6; i++) {
            const randomStyle = styles[i % styles.length];
            // 使用 Unsplash Source API 根据关键词获取随机图片
            const imageUrl = `https://images.unsplash.com/photo-${1500000000000 + Math.floor(Math.random()*10000000)}?auto=format&fit=crop&w=800&q=80&sig=${i}&keywords=${keyword}`;
            
            const posterWrap = document.createElement('div');
            posterWrap.style.position = 'relative';

            const html = `
                <div class="poster" id="poster-${i}">
                    <button class="download-btn" onclick="savePoster('poster-${i}')">保存图片</button>
                    <img src="${imageUrl}" class="bg-image" crossorigin="anonymous">
                    <div class="content ${randomStyle}">
                        <div class="title">${title}</div>
                        <div class="subtitle">${subtitle}</div>
                        <div class="author">${author}</div>
                    </div>
                </div>
            `;
            
            posterWrap.innerHTML = html;
            preview.appendChild(posterWrap);
        }
    }

    async function savePoster(id) {
        const element = document.getElementById(id);
        const btn = element.querySelector('.download-btn');
        
        // 隐藏按钮以防被截进去
        btn.style.display = 'none';

        try {
            const canvas = await html2canvas(element, {
                useCORS: true, // 允许跨域图片
                scale: 2       // 提高清晰度
            });
            const link = document.createElement('a');
            link.download = `AI-Poster-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (err) {
            alert('图片加载中，请稍后再试或检查网络');
            console.error(err);
        } finally {
            btn.style.display = 'block';
        }
    }

    // 初始化生成
    window.onload = generatePosters;
</script>

</body>
</html>
