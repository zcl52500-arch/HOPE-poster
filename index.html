<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>HOPE AI 意境生图 - 深度视觉版</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2E84C5; }
        body { margin: 0; background: #121212; font-family: "PingFang SC", sans-serif; display: flex; height: 100vh; color: #fff; }

        /* 控制面板 */
        .sidebar { width: 360px; background: #1a1a1a; padding: 40px; box-shadow: 10px 0 30px rgba(0,0,0,0.3); z-index: 10; display: flex; flex-direction: column; }
        .logo { font-size: 14px; font-weight: 900; letter-spacing: 5px; color: var(--primary); margin-bottom: 40px; text-transform: uppercase; }
        .group { margin-bottom: 25px; }
        label { display: block; font-size: 11px; color: #666; margin-bottom: 10px; font-weight: bold; }
        textarea, input { width: 100%; border: 1px solid #333; background: #222; padding: 14px; border-radius: 8px; font-size: 14px; color: #fff; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); }
        
        .btn-gen { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-gen:hover { background: #3d9be3; transform: scale(1.02); }

        /* 画布展示区 */
        .main { flex: 1; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #222, #000); position: relative; }
        
        /* 海报核心设计 */
        #poster {
            width: 420px; height: 580px; background: #000; position: relative;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6); overflow: hidden;
            border-radius: 4px;
        }

        /* 模拟 AI 生图背景 */
        #bgImg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            filter: contrast(1.1) brightness(0.7); /* 自动胶片质感 */
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            transform: scale(1.1); /* 微缩放增加沉浸感 */
        }

        /* 艺术层：动态渐变遮罩 */
        .overlay {
            position: absolute; inset: 0; z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
        }

        /* 文案排版 */
        .content { position: relative; z-index: 10; padding: 60px 45px; height: 100%; display: flex; flex-direction: column; }
        
        .title-container { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .title { font-size: 42px; font-weight: 900; line-height: 1.25; letter-spacing: -1px; margin-bottom: 20px; }
        .line { width: 60px; height: 6px; background: var(--primary); box-shadow: 0 0 20px var(--primary); margin-bottom: 30px; }
        .sub { font-size: 16px; font-weight: 300; opacity: 0.8; line-height: 1.8; max-width: 90%; }
        
        .footer { display: flex; justify-content: space-between; align-items: flex-end; }
        .author { font-size: 12px; letter-spacing: 3px; font-weight: bold; border-bottom: 1px solid var(--primary); padding-bottom: 4px; }
        .brand { font-family: serif; font-style: italic; font-size: 28px; opacity: 0.3; }

        .save-btn { position: absolute; top: 20px; right: 20px; z-index: 100; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .save-btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">HOPE AI ENGINE</div>
    
    <div class="group">
        <label>输入文案 (AI 将感应意境)</label>
        <textarea id="inTitle" rows="4">教育是点燃火焰，不是灌输知识</textarea>
    </div>

    <div class="group">
        <label>视觉风格关键词 (英文，如: Cyberpunk, Abstract, Zen)</label>
        <input id="inKeyword" type="text" value="abstract fire">
    </div>

    <div class="group">
        <label>署名</label>
        <input id="inAuthor" type="text" value="HOPE VISION">
    </div>

    <button class="btn-gen" onclick="generateAIImage()">生成 AI 视觉海报</button>
</div>

<div class="main">
    <div id="poster">
        <div id="bgImg"></div>
        <div class="overlay"></div>
        <button class="save-btn" onclick="save()">保存高质海报</button>
        <div class="content">
            <div class="title-container">
                <div class="title" id="outTitle"></div>
                <div class="line"></div>
                <div class="sub" id="outSub"></div>
            </div>
            <div class="footer">
                <div class="author" id="outAuthor"></div>
                <div class="brand">H.</div>
            </div>
        </div>
    </div>
</div>

<script>
    function generateAIImage() {
        const title = document.getElementById('inTitle').value;
        const kw = document.getElementById('inKeyword').value || 'minimalist';
        const author = document.getElementById('inAuthor').value;

        document.getElementById('outTitle').innerText = title;
        document.getElementById('outAuthor').innerText = author;
        
        // 模拟 AI 对文案的“语义理解”——提取前四个字
        const subHint = "基于『" + title.substring(0, 4) + "』的意境创作";
        document.getElementById('outSub').innerText = subHint;

        // 使用特定的随机源模拟生成式画质
        const randomSeed = Math.floor(Math.random() * 10000);
        const imgUrl = `https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1000&q=80&sig=${randomSeed}&keywords=${kw}`;
        
        const bg = document.getElementById('bgImg');
        bg.style.backgroundImage = `url('${imgUrl}')`;
        bg.style.transform = "scale(1)"; // 触发入场动画
    }

    function save() {
        const poster = document.getElementById('poster');
        html2canvas(poster, { useCORS: true, scale: 3 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'HOPE-AI-Vision.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    // 初次加载
    window.onload = generateAIImage;
</script>

</body>
</html>
