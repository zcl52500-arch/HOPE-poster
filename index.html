<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Poster Generator</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
background:#f4f6f8;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

.container{
display:flex;
height:100vh;
}

.panel{
width:420px;
background:#fff;
padding:30px;
box-shadow:2px 0 10px rgba(0,0,0,0.06);
overflow:auto;
}

.panel h2{
margin-top:0;
}

textarea,input{
width:100%;
margin-top:8px;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
box-sizing:border-box;
}

button{
margin-top:16px;
width:100%;
padding:12px;
background:#2E84C5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.preview{
flex:1;
padding:40px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:40px;
overflow:auto;
}

.poster{
aspect-ratio:4/5;
background:white;
padding:60px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
display:grid;
grid-template-columns:repeat(12,1fr);
grid-auto-rows:min-content;
position:relative;
}

.title{
font-size:44px;
font-weight:700;
line-height:1.35;
}

.subtitle{
font-size:22px;
margin-top:12px;
color:#2E84C5;
}

.author{
position:absolute;
bottom:40px;
right:40px;
font-size:14px;
color:#666;
}

.brand{
position:absolute;
top:30px;
left:30px;
display:flex;
gap:6px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.blue{background:#2E84C5;}
.green{background:#76B92E;}
.yellow{background:#FFD100;}

.line{
border-left:6px solid #FFD100;
padding-left:18px;
}

.block{
background:#2E84C5;
color:white;
padding:24px;
}

.splitRight{
border-left:4px solid #76B92E;
padding-left:16px;
}

.download{
position:absolute;
bottom:12px;
left:12px;
font-size:12px;
cursor:pointer;
color:#2E84C5;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<h2>HOPE 海报生成器</h2>

<label>标题</label>
<textarea id="title">教育的改变</textarea>

<label>副标题</label>
<textarea id="subtitle">往往从一个微小的行动开始</textarea>

<label>署名</label>
<input id="author" value="HOPE学堂">

<button onclick="generate()">生成海报</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

const layouts=[
layoutQuote,
layoutCenter,
layoutLeft,
layoutRight,
layoutBlock,
layoutSplit
]

function generate(){

let preview=document.getElementById("preview")
preview.innerHTML=""

let title=document.getElementById("title").value
let subtitle=document.getElementById("subtitle").value
let author=document.getElementById("author").value

let shuffled=[...layouts].sort(()=>0.5-Math.random())

for(let i=0;i<6;i++){

let layout=shuffled[i]

let poster=document.createElement("div")
poster.className="poster"

poster.innerHTML=`
<div class="brand">
<div class="dot blue"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>

${layout(title,subtitle)}

<div class="author">${author}</div>

<div class="download" onclick="download(this)">下载</div>
`

preview.appendChild(poster)

}

}

function layoutQuote(t,s){

return `
<div class="line" style="grid-column:2/10;margin-top:80px">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
`
}

function layoutCenter(t,s){

return `
<div style="grid-column:3/11;text-align:center;margin-top:120px">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
`
}

function layoutLeft(t,s){

return `
<div style="grid-column:1/8;margin-top:100px">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
`
}

function layoutRight(t,s){

return `
<div style="grid-column:6/13;margin-top:120px">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
`
}

function layoutBlock(t,s){

return `
<div class="block" style="grid-column:3/10;margin-top:140px">
<div class="title">${t}</div>
<div style="margin-top:10px">${s}</div>
</div>
`
}

function layoutSplit(t,s){

return `
<div style="grid-column:1/6;margin-top:120px">
<div class="title">${t}</div>
</div>

<div class="splitRight" style="grid-column:6/12;margin-top:140px">
<div class="subtitle">${s}</div>
</div>
`
}

function download(el){

let poster=el.parentElement

html2canvas(poster,{scale:3}).then(canvas=>{

let link=document.createElement("a")
link.download="hope-poster.png"
link.href=canvas.toDataURL()
link.click()

})

}

generate()

</script>

</body>
</html>
