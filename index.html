<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>HOPE AI 语义生图海报</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2E84C5; }
        body { margin: 0; background: #f4f7f6; font-family: "PingFang SC", sans-serif; display: flex; height: 100vh; }

        /* 左侧控制栏 */
        .sidebar { width: 380px; background: white; padding: 40px; box-shadow: 2px 0 20px rgba(0,0,0,0.05); z-index: 10; display: flex; flex-direction: column; }
        .logo { font-weight: 900; letter-spacing: 4px; color: var(--primary); margin-bottom: 30px; }
        .group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        textarea, input { width: 100%; border: 1px solid #eee; background: #f9f9f9; padding: 12px; border-radius: 8px; font-size: 14px; outline: none; }
        
        .btn-gen { background: #000; color: white; border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-gen:hover { background: var(--primary); }

        /* 右侧展示区 */
        .main { flex: 1; display: flex; align-items: center; justify-content: center; background: #ddd; perspective: 1000px; }
        
        /* 海报设计 */
        #poster {
            width: 400px; height: 560px; background: white; position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); overflow: hidden;
            transition: transform 0.5s;
        }

        /* 真实的图片背景层 */
        .img-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            filter: brightness(0.8) contrast(1.1); /* 自动色彩增强 */
            transition: 1s ease-in-out;
            z-index: 1;
        }

        /* 艺术遮罩：提升人工设计感 */
        .overlay {
            position: absolute; inset: 0; z-index: 2;
            background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 60%);
        }

        .content { position: relative; z-index: 10; padding: 45px; height: 100%; display: flex; flex-direction: column; color: white; }
        
        /* 这里的排版采用了现代杂志感设计 */
        .title { font-size: 34px; font-weight: 800; line-height: 1.3; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .line { width: 40px; height: 4px; background: var(--primary); margin: 25px 0; }
        .sub { font-size: 16px; font-weight: 300; opacity: 0.9; line-height: 1.6; }
        
        .footer { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; }
        .author { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .brand-icon { width: 30px; height: 30px; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }

        .save-btn { position: absolute; top: 20px; right: 20px; z-index: 20; background: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">HOPE AI DESIGN</div>
    
    <div class="group">
        <label>核心文案 (标题)</label>
        <textarea id="inTitle" rows="3">在星辰大海中寻找答案</textarea>
    </div>

    <div class="group">
        <label>视觉关键词 (英文，如: Galaxy, Ocean, Forest)</label>
        <input id="inKeyword" type="text" placeholder="输入意境词，系统将自动生图" value="stars">
    </div>

    <div class="group">
        <label>署名</label>
        <input id="inAuthor" type="text" value="HOPE VISION">
    </div>

    <button class="btn-gen" onclick="updatePoster()">根据意境生图</button>
    <p style="font-size: 11px; color: #999; margin-top: 15px;">* 输入关键词后点击按钮，背景图将实时匹配生成。</p>
</div>

<div class="main">
    <div id="poster">
        <div class="img-bg" id="bgImg"></div>
        <div class="overlay"></div>
        <button class="save-btn" onclick="download()">保存海报</button>
        <div class="content">
            <div class="title" id="outTitle"></div>
            <div class="line"></div>
            <div class="sub">每一个伟大的发现，都始于一次勇敢的仰望。</div>
            <div class="footer">
                <div class="author" id="outAuthor"></div>
                <div class="brand-icon">H</div>
            </div>
        </div>
    </div>
</div>

<script>
    function updatePoster() {
        const title = document.getElementById('inTitle').value;
        const kw = document.getElementById('inKeyword').value || 'nature';
        const author = document.getElementById('inAuthor').value;

        document.getElementById('outTitle').innerText = title;
        document.getElementById('outAuthor').innerText = author;

        // 根据关键词从高质图库获取图片 (使用 Unsplash Source API)
        const timestamp = new Date().getTime();
        const imgUrl = `https://images.unsplash.com/photo-1500000000000?auto=format&fit=crop&w=800&q=80&sig=${timestamp}&keywords=${kw}`;
        
        const bgLayer = document.getElementById('bgImg');
        bgLayer.style.backgroundImage = `url('${imgUrl}')`;
        
        // 增加一点入场动画感
        const poster = document.getElementById('poster');
        poster.style.transform = "rotateY(10deg) scale(0.95)";
        setTimeout(() => {
            poster.style.transform = "rotateY(0deg) scale(1)";
        }, 300);
    }

    function download() {
        const poster = document.getElementById('poster');
        const btn = poster.querySelector('.save-btn');
        btn.style.display = 'none';

        html2canvas(poster, {
            useCORS: true, 
            scale: 2
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'HOPE-AI-Poster.png';
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'block';
        });
    }

    window.onload = updatePoster;
</script>

</body>
</html>
