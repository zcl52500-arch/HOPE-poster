<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>HOPE Generative Poster v3</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
background:#f3f5f7;
}

.container{
display:flex;
height:100vh;
}

.panel{
width:420px;
background:#fff;
padding:30px;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
overflow:auto;
}

textarea,input{
width:100%;
margin-top:8px;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

button{
margin-top:16px;
width:100%;
padding:12px;
background:#2E84C5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.preview{
flex:1;
padding:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
overflow:auto;
}

.poster{
position:relative;
aspect-ratio:4/5;
background:white;
padding:50px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
display:grid;
grid-template-columns:repeat(12,1fr);
grid-auto-rows:min-content;
}

.title{
font-size:48px;
font-weight:700;
line-height:1.3;
}

.subtitle{
font-size:24px;
margin-top:10px;
color:#2E84C5;
}

.author{
font-size:14px;
position:absolute;
bottom:30px;
right:30px;
color:#666;
}

.brand{
position:absolute;
top:20px;
left:20px;
display:flex;
gap:6px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.blue{background:#2E84C5;}
yellow{background:#FFD100;}
.green{background:#76B92E;}

.line{
border-left:6px solid #FFD100;
padding-left:16px;
}

.block{
background:#2E84C5;
color:white;
padding:20px;
}

.download{
position:absolute;
bottom:10px;
left:10px;
font-size:12px;
cursor:pointer;
color:#2E84C5;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<h2>HOPE 海报生成器</h2>

<label>标题</label>
<textarea id="title">教育的改变</textarea>

<label>副标题</label>
<textarea id="subtitle">往往从一个微小的行动开始</textarea>

<label>署名</label>
<input id="author" value="HOPE学堂">

<button onclick="generate()">生成海报</button>

</div>

<div class="preview" id="preview"></div>

</div>

<script>

const layouts=[
layoutLeft,
layoutCenter,
layoutRight,
layoutQuote,
layoutBlock,
layoutMinimal,
layoutSplit,
layoutDiagonal
]

function generate(){

let preview=document.getElementById("preview")
preview.innerHTML=""

let title=document.getElementById("title").value
let subtitle=document.getElementById("subtitle").value
let author=document.getElementById("author").value

for(let i=0;i<6;i++){

let layout=layouts[Math.floor(Math.random()*layouts.length)]

let poster=document.createElement("div")
poster.className="poster"

poster.innerHTML=`
<div class="brand">
<div class="dot blue"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
</div>
${layout(title,subtitle,author)}
<div class="download" onclick="download(this)">下载</div>
`

preview.appendChild(poster)

}

}

function layoutLeft(t,s,a){

return `
<div style="grid-column:1/8">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutCenter(t,s,a){

return `
<div style="grid-column:3/11;text-align:center">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutRight(t,s,a){

return `
<div style="grid-column:6/13">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutQuote(t,s,a){

return `
<div class="line" style="grid-column:2/11">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutBlock(t,s,a){

return `
<div class="block" style="grid-column:3/10">
<div class="title">${t}</div>
<div>${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutMinimal(t,s,a){

return `
<div style="grid-column:4/12;margin-top:120px">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutSplit(t,s,a){

return `
<div style="grid-column:1/7">
<div class="title">${t}</div>
</div>
<div style="grid-column:7/13">
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function layoutDiagonal(t,s,a){

return `
<div style="grid-column:2/10;transform:rotate(-3deg)">
<div class="title">${t}</div>
<div class="subtitle">${s}</div>
</div>
<div class="author">${a}</div>
`
}

function download(el){

let poster=el.parentElement

html2canvas(poster,{scale:3}).then(canvas=>{

let link=document.createElement("a")
link.download="hope-poster.png"
link.href=canvas.toDataURL()
link.click()

})

}

generate()

</script>

</body>
</html>
